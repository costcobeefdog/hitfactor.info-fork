version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - MONGO_URL=${MONGO_URL}
      - PAYLOAD_SECRET=${PAYLOAD_SECRET}
    deploy:
      resources:
        limits:
          memory: 2048M
        reservations:
          memory: 1024M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  uploads-worker:
    build:
      context: .
      dockerfile: Dockerfile-uploadsWorker
    environment:
      - NODE_ENV=production
      - MONGO_URL=${MONGO_URL}
      - PAYLOAD_SECRET=${PAYLOAD_SECRET}
      - ALGOLIA_URL=${ALGOLIA_URL}
      - PS_S3_ACCESS_KEY_ID=${PS_S3_ACCESS_KEY_ID}
      - PS_S3_SECRET_ACCESS_KEY=${PS_S3_SECRET_ACCESS_KEY}
    deploy:
      resources:
        limits:
          memory: 2048M
        reservations:
          memory: 512M
    restart: unless-stopped

